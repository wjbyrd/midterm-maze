<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Archives of Microeconomics</title>
<style>
body{
font-family:Arial,sans-serif;
margin:0;
padding:0;
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
color: white;

background:
linear-gradient(rgba(2,6,23,.8),rgba(2,6,23,.8)),
url('question_background_image.jpeg');

background-size:cover;
background-position:center;
background-attachment:scroll;
}
@keyframes torchFlicker {
0%   { filter: brightness(1); }
25%  { filter: brightness(1.05); }
50%  { filter: brightness(0.97); }
75%  { filter: brightness(1.04); }
100% { filter: brightness(1); }
}
#gameBox{
max-width:720px;
width:90%;
min-height:75vh;
margin:20px auto;
padding:26px;
text-align:center;
background:#111827;
border-radius:14px;
box-sizing:border-box;
box-shadow:0 0 40px rgba(0,0,0,0.8),0 0 20px rgba(251,191,36,0.1),inset 0 0 30px rgba(0,0,0,0.6);
border:1px solid rgba(255,255,255,0.05);
animation:torchFlicker 6s infinite;
transition:box-shadow .3s ease;
position:relative;
}
.hit { box-shadow: 0 0 60px #ef4444, inset 0 0 40px #7f1d1d !important; animation: shake 0.4s ease; }
#autosave { position: absolute; top: 15px; right: 15px; font-size: 11px; opacity: 0.5; font-style: italic; }
button{
padding:12px 22px; margin:8px; font-size:16px; cursor:pointer;
background:#374151; color:white; border:none; border-radius:8px; transition:all 0.2s ease;
}
button:hover{ background:#4b5563; transform:translateY(-2px); }
h2{ text-shadow: 0 0 10px rgba(255,255,255,0.3), 0 0 20px rgba(251,191,36,0.2); margin-bottom: 5px;}
#mazeTrack{ font-size:22px; line-height:32px; letter-spacing:2px; margin-bottom:10px; display: inline-block; text-shadow:0 0 10px rgba(34,197,94,0.6); }
#progressBar{ width:100%; height:22px; background:#2d3748; border-radius:12px; margin-bottom:20px; overflow:hidden; }
#progressFill{ height:100%; width:0%; background:linear-gradient(90deg,#f59e0b,#ef4444); transition:width 0.4s ease; }
.boss-title { font-size: 28px; font-weight: bold; margin-bottom: 15px; display: block; }
.boss-q { font-style: italic; font-size: 19px; border-left: 4px solid var(--bossColor); padding-left: 15px; margin: 20px 0; text-align: left; }
.area-title { color: #9ca3af; font-size: 14px; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 15px; }
.hint-box { font-size: 13px; color: #fbbf24; margin-top: 15px; opacity: 0.8; height: 18px; }

@keyframes shake { 0% { transform:translateX(0); } 25% { transform:translateX(-8px); } 50% { transform:translateX(8px); } 75% { transform:translateX(-6px); } 100% { transform:translateX(0); } }
@keyframes victoryGlow { 0% { transform:scale(1); text-shadow:0 0 10px gold; } 50% { transform:scale(1.1); text-shadow:0 0 25px gold, 0 0 40px orange; } 100% { transform:scale(1); text-shadow:0 0 10px gold; } }
.victory{ animation:victoryGlow 1.5s ease-in-out infinite; color: gold !important; }  
  .dungeon-container {
    position: relative;
    display: flex;
    gap:40px;
    justify-content: center;
    align-items: flex-start;
    padding-top: 40px;
}

.fade-out-text {
    animation: fadeOut 5s forwards;
    font-weight: bold;
    color: #4ade80; /* A nice success green */
}

@keyframes fadeOut {
    0% { opacity: 1; }
    70% { opacity: 1; } /* Stay fully visible for 3.5 seconds */
    100% { opacity: 0; } /* Fade out over the last 1.5 seconds */
}
  
#question {
    font-size: 20px; /* Increased from your current size */
    line-height: 1.4;
    font-weight: 500;
    margin: 20px 0;
    text-shadow: 0 2px 4px rgba(0,0,0,0.5); /* Adds depth for readability */
}

.answers{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:14px;
}

.answers button{
flex:1 1 200px;
max-width:320px;
}
    
/* Also updating the Boss question text specifically */
.boss-q {
    font-style: italic;
    font-size: 24px; /* Matching the new standard size */
    border-left: 4px solid var(--bossColor);
    padding-left: 15px;
    margin: 20px 0;
    text-align: left;
}
  
#mazeTrack {
    display: grid;
    grid-template-columns: repeat(10, 36px);
    justify-content: center;
    gap: 10px;
    margin: 25px auto;
}
       
.maze-box{
    width:36px;
    height:36px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:20px;
    border-radius:6px;
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.1);
    transition:all 0.3s ease;
}

.maze-box.active {
    background: rgba(251, 191, 36, 0.3);
    border: 2px solid #fbbf24;
    z-index: 10;
    animation: activePulse 0.8s infinite alternate;
}
  
@keyframes activePulse {
    0% { box-shadow: 0 0 5px #fbbf24; transform: scale(1.1); }
    100% { box-shadow: 0 0 20px #fbbf24; transform: scale(1.2); }
}
  
/* Gives a faint, constant aura to the boss rooms */
.maze-box:nth-child(10) { text-shadow: 0 0 5px #fbbf24; }
.maze-box:nth-child(20) { text-shadow: 0 0 10px #a855f7; }
.maze-box:nth-child(30) { text-shadow: 0 0 15px #ef4444; }
  
#gameBox.boss-mode {
    border: 2px solid #ef4444;
    box-shadow: 0 0 50px rgba(239, 68, 68, 0.4), inset 0 0 20px rgba(239, 68, 68, 0.2);
}
   
.torch{
position:absolute;
width:70px;
top:30px;
z-index:10;
animation: torchFlicker 3s infinite alternate;
pointer-events:none;
opacity:.95;
filter: drop-shadow(0 0 12px rgba(255,180,80,.7));
}

.left-torch{
left:18px;
}

.right-torch{
right:18px;
transform:scaleX(-1);
}
  
@keyframes bossShake {
0% { transform: translate(0,0); }
20% { transform: translate(-20px,14px); }
40% { transform: translate(20px,-14px); }
60% { transform: translate(-18px,-16px); }
80% { transform: translate(18px,16px); }
100% { transform: translate(0,0); }
}

.boss-shake{
animation: bossShake 0.6s ease;
}

.fullscreenBtn{
position:absolute;
top:12px;
left:12px;
background:#374151;
color:white;
border:none;
padding:6px 10px;
border-radius:6px;
cursor:pointer;
font-size:12px;
}
    
#startScreen {
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 100%;
background-image: url('start_screen_image.png'); 
background-size: cover; 
background-position: center; 
background-repeat: no-repeat;
z-index: 100;
display: flex;
flex-direction: column;
justify-content: center;
align-items: center;
text-align: center;
}

@media (max-width:600px){

#mazeTrack div{
width:20px;
height:20px;
}

#gameBox{
transform:scale(0.95);
transform-origin:top center;
}

.answers button{
flex:1 1 100%;
}
}

#hallwayTransition{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:
linear-gradient(rgba(0,0,0,.7),rgba(0,0,0,.7)),
url('hallway1.png');
background-size:cover;
background-position:center;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
color:white;
font-size:26px;
letter-spacing:2px;
z-index:200;
opacity:0;
pointer-events:none;
transition:opacity 1.2s ease;
animation: hallwayZoom 3.2s linear forwards;
}

#hallwayTransition.active{
opacity:1;
}

#hallwayText{
max-width:600px;
background:rgba(0,0,0,0.55);
padding:30px;
border-radius:10px;
border:1px solid rgba(255,255,255,0.15);
box-shadow:0 0 25px rgba(0,0,0,0.6);
}

@keyframes hallwayZoom {
0% {
transform: scale(1);
}
100% {
transform: scale(1.08);
}
}

#artifactDrop{
margin-top:20px;
padding:14px;
background:rgba(15,23,42,.6);
border-radius:10px;
border:1px solid rgba(99,102,241,.35);
text-align:center;
}

#artifactImage{
width:96px;
margin-bottom:8px;
}
  
#artifactDrop img{
filter: drop-shadow(0 0 12px rgba(56,189,248,.8));
}

#artifactVault{
margin-top:60px;
width:260px;
padding:18px;
border-radius:12px;
background:linear-gradient(180deg,#020617,#020617 60%,#020617 100%);
box-shadow:0 0 25px rgba(56,189,248,.15);
border:1px solid rgba(56,189,248,.25);
text-align:center;
display:flex;
flex-direction:column;
align-items:center;
gap:18px;
display:none;
}

#artifactVault h3{
color:#60a5fa;
margin-bottom:10px;
}

.artifactSlot{
display:flex;
flex-direction:column;
align-items:center;
justify-content:flex-start;
width:110px;
margin:0 10px;
opacity:.25;
transition:all .4s ease;
text-align:center;
}

.artifactSlot img{
width:64px;
filter:grayscale(1);
transition:all .4s ease;
}

.artifactSlot span{
display:block;
font-size:13px;
color:#94a3b8;
margin-top:8px;
line-height:1.2;
}
  
/* UNLOCKED STATE */
.artifactSlot.unlocked{
opacity:1;
transform:scale(1.05);
}

@keyframes relicPulse{
0%{ filter: drop-shadow(0 0 8px #38bdf8); }
50%{ filter: drop-shadow(0 0 18px #60a5fa); }
100%{ filter: drop-shadow(0 0 8px #38bdf8); }
}

.artifactSlot.unlocked img{
filter: drop-shadow(0 0 14px rgba(56,189,248,.9));
animation: relicPulse 3s infinite;
}

.artifactSlot.unlocked span{
color:#e2e8f0;
font-weight:600;
}

</style>
</head>

<script>
const bgMusic = new Audio('545057__szegvari__monk-chant-fantasy.wav'); 
bgMusic.loop = true; 
bgMusic.volume = 0.1; 

const bossMusic = new Audio('boss_battle_music.wav');
bossMusic.loop = true;
bossMusic.volume = 0.10;
  
const sfxMilestone = new Audio('387232__steaq__badge-coin-win.wav');
const sfxVictory = new Audio('220184__gameaudio__win-spacey.wav');

function playBossMusic(){

if(!bossMusic.paused) return;

bgMusic.pause();
bossMusic.currentTime = 0;
bossMusic.play().catch(e=>console.log("Boss music blocked"));

}

function playExplorationMusic(){
bossMusic.pause();
if(!bgMusic.paused) return;
bgMusic.currentTime = 0;
bgMusic.play().catch(e=>console.log("Music blocked"));
}

const hallwayImages = [
"hallway1.png",
"hallway2.png",
"hallway3.png"
];
  
function goFullscreen(){
let el = document.documentElement;

if (el.requestFullscreen) {
    el.requestFullscreen();
} 
else if (el.webkitRequestFullscreen) { // Safari
    el.webkitRequestFullscreen();
} 
else if (el.msRequestFullscreen) { // old Edge
    el.msRequestFullscreen();
}
}
    
// 1. Initial UI State: Hide game until startGame runs
document.getElementById("gameBox").style.display = "none";
document.querySelectorAll(".torch").forEach(t => t.style.display = "none");

// 2. Global Variables (Declared only ONCE)
let totalAttempts = 0;
let bossHealth = 3; 
let bossPool = [];
let correctAnswers = 0; 
let maxStreak = 0; 
let username = "";
let streak = 0; 
let startTime; // Will be set in startGame()
let room = localStorage.getItem("gauntletRoom") ? parseInt(localStorage.getItem("gauntletRoom")) : 1;
let currentQuestion = null;
let detourActive = false;
let detourReturnRoom = null;
let lastTypes = [];
let easyCycle = 0 ;
let mediumCycle = 0;
let usedQuestions = {
easy: [],
medium: [],
hard: [],
easyBoss: [],
mediumBoss: [],
finalBoss: []
};
let conceptMemory = {
budget:0,
demand:0,
indifference:0,
elasticity:0,
equilibrium:0
};

const artifacts = {

seal:{
img:"seal_of_preferences.png",
title:"Seal of Preferences",
text:"An ancient seal revealing the curves of desire. Where preferences meet the budget constraint, utility is maximized."
},

prism:{
img:"prism_of_tradeoffs.png",
title:"Prism of Tradeoffs",
text:"A crystal that fractures a price change into its hidden forces: substitution toward cheaper goods and the pull of income on purchasing power."
},

scepter:{
img:"scepter_of_elasticity.png",
title:"Scepter of Elasticity",
text:"The royal instrument of the Sovereign. It reveals how strongly quantity demanded responds when price changes."
}

};
  
// Restore saved username if it exists
const savedUser = localStorage.getItem("gauntletUser");
if(savedUser){
document.getElementById("usernameInput").value = savedUser;
}

// 3. Entry Logic
function startGame() {
    let inputName = document.getElementById("usernameInput").value.trim();
    if (!inputName) {
        alert("A name is required to bind your soul to the archives.");
        return;
    }
    
    username = inputName;
    localStorage.setItem("gauntletUser", username);

    // RESET GAME STATE
    room = 1;
    bossHealth = 3;
    streak = 0;
    maxStreak = 0;
    totalAttempts = 0;
    correctAnswers = 0;
    bossPool = [];
    calcBag = [];
    localStorage.removeItem("gauntletRoom");
    localStorage.removeItem("vaultSeal");
    localStorage.removeItem("vaultPrism");
    localStorage.removeItem("vaultScepter");
    
    // Reveal the game and torches
    document.getElementById("startScreen").style.display = "none";
    document.getElementById("gameBox").style.display = "block";
    document.getElementById("artifactVault").style.display = "block";
    document.querySelectorAll(".torch").forEach(t => t.style.display = "block");
    
  if(localStorage.getItem("vaultSeal")){
        document.getElementById("vaultSeal").classList.add("unlocked");
    }

    if(localStorage.getItem("vaultPrism")){
        document.getElementById("vaultPrism").classList.add("unlocked");
    }

    if(localStorage.getItem("vaultScepter")){
        document.getElementById("vaultScepter").classList.add("unlocked");
    }
  
    // Start atmosphere and timer
    bgMusic.play().catch(e => console.log("Audio started"));
    startTime = Date.now(); 
    loadQuestion();
}

// 4. Enter Key Support
document.getElementById("usernameInput").addEventListener("keypress", function(event) {
    if (event.key === "Enter") {
        event.preventDefault();
        startGame();
    }
});

// 5. Your Lore & Logic (Area Names)
function getAreaName(r) {
    if (r <= 9) return "The Dimly Lit Archives";
    if (r === 10) return "The Warden's Gate";
    if (r <= 19) return "The Hall of Substitutions";
    if (r === 20) return "The Decomposer's Lair";
    if (r <= 25) return "The Vault of Elasticity";
    if (r <= 29) return "The Calculations Corridor";
    return "The Sovereign's Throne";
};
  
// --- Question Pools follow below ---
const easyPools = {
definition: questionBanks.easy.filter(q => q.type === "definition"),
interpretation: questionBanks.easy.filter(q => q.type === "interpretation"),
trap: questionBanks.easy.filter(q => q.type === "trap")
};
const mediumPools = {
definition: questionBanks.medium.filter(q => q.type === "definition"),
interpretation: questionBanks.medium.filter(q => q.type === "interpretation"),
trap: questionBanks.medium.filter(q => q.type === "trap")
};
  
const questionBanks = {
easyBoss:[
{q:"The Warden of Indifference challenges you. A consumer buys goods X and Y. Which condition must hold at the optimal bundle on an indifference curve?",options:["The marginal rate of substitution equals the price ratio","The consumer buys equal quantities of both goods","Income equals total utility","Prices of goods must be identical"],a:0,feedback:"Utility maximization occurs where the marginal rate of substitution equals the price ratio."},
{q:"The Warden reveals the numbers. A consumer has MUx = 24 and MUy = 12. Prices are Px = $6 and Py = $3. Are they currently maximizing utility?",options:["Yes, MU per dollar is equal","No, they should buy more X","No, they should buy more Y","Not enough information"],a:0,feedback:"MUx/Px = 24/6 = 4 and MUy/Py = 12/3 = 4. Marginal utility per dollar is equal, so the consumer is maximizing utility."},
{q:"The Warden disrupts the balance. Now MUx/Px = 6 and MUy/Py = 3. What should the consumer do to restore equilibrium?",options:["Buy more X and less Y","Buy more Y and less X","Buy equal amounts of both goods","Reduce consumption of both goods"],a:0,feedback:"Consumers increase consumption of the good with the higher marginal utility per dollar until the ratios equalize."}
],
mediumBoss:[
{q:"The Decomposer of Choice lowers the price of a good. What two forces determine how consumption changes?",options:["Substitution effect and income effect","Marginal cost and marginal revenue","Demand and supply","Utility and profit"],a:0,feedback:"A price change affects behavior through substitution and income effects."},
{q:"The Decomposer continues. The price of a normal good falls. What direction do the substitution and income effects move?",options:["Both increase quantity demanded","Substitution increases demand while income decreases demand","Both decrease demand","Income increases demand but substitution decreases demand"],a:0,feedback:"For normal goods both substitution and income effects increase quantity demanded."},
{q:"Final strike from the Decomposer. Suppose the good is inferior. The substitution effect increases demand but the income effect decreases demand. If the substitution effect is stronger, what happens overall?",options:["Quantity demanded rises","Quantity demanded falls","Demand disappears","Price rises"],a:0,feedback:"If substitution dominates, demand still increases even though the income effect moves the other direction."}
],
finalBoss:[
{q:"The Sovereign of Elasticity begins the final trial. When demand is elastic, what happens to total revenue if price increases?",options:["Total revenue decreases","Total revenue increases","Total revenue stays constant","Revenue becomes unpredictable"],a:0,feedback:"With elastic demand, price and total revenue move in opposite directions."},
{q:"The Sovereign now tests your calculation. Price rises from $10 to $12 and quantity demanded falls from 100 to 80. Using the midpoint method, what is the elasticity?",options:["About 0.82 (inelastic)","About 1.22 (elastic)","Exactly 1 (unit elastic)","About 2.5"],a:1,feedback:"Elasticity ≈ 1.22, meaning demand is elastic."},
{q:"Final blow. Given the elasticity you calculated, what happens to total revenue when price rises from $10 to $12?",options:["Total revenue decreases","Total revenue increases","Total revenue stays the same","Total revenue becomes zero"],a:0,feedback:"Because demand is elastic, increasing price reduces total revenue."}
],
    easy: [
{ id:1, q:"A theory of choice assumes individuals...",options:["Make random decisions","Choose the most preferred affordable bundle","Always maximize income","Always minimize work"],a:1,tag:"preferences",type:"definition",feedback:"Consumers choose the most preferred bundle they can afford given their budget constraint."},
{ id:2, q:"Consumer preferences are typically represented using...",options:["Demand curves","Indifference curves","Supply curves","Cost curves"],a:1,tag:"indifference",type:"definition",feedback:"Indifference curves show combinations of goods that give the consumer the same level of satisfaction."},
{ id:3, q:"Indifference curves represent...",options:["Bundles giving equal utility","Bundles giving equal price","Bundles giving equal income","Bundles giving equal production"],a:0,tag:"indifference",type:"definition",feedback:"Each point on an indifference curve provides the same level of utility."},
{ id:4, q:"Marginal rate of substitution represents...",options:["Rate consumers trade one good for another","Price ratio","Income ratio","Demand elasticity"],a:0,tag:"indifference",type:"definition",feedback:"The MRS shows how much of one good a consumer is willing to give up for another."},
{ id:5, q:"Utility refers to...",options:["Satisfaction a consumer receives","Total income","Market demand","Firm profit"],a:0,tag:"preferences",type:"definition",feedback:"Utility represents the satisfaction gained from consumption."},
{ id:6, q:"The budget constraint shows...",options:["All affordable combinations of goods","Only preferred bundles","Production possibilities","Market equilibrium"],a:0,tag:"budget",type:"definition",feedback:"The budget constraint represents what a consumer can afford."},
{ id:7, q:"A bundle of goods refers to...",options:["A set of goods a consumer may consume","A firm's production level","Total market demand","A supply schedule"],a:0,tag:"preferences",type:"definition",feedback:"A bundle is simply a combination of goods."},
{ id:8, q:"Demand represents...",options:["Quantity consumers are willing and able to buy at different prices","Total production of firms","Government price controls","Consumer income levels"],a:0,tag:"demand",type:"definition",feedback:"Demand reflects willingness and ability to purchase."},
{ id:9, q:"A demand curve typically slopes...",options:["Downward","Upward","Vertically","Perfectly flat"],a:0,tag:"demand",type:"definition",feedback:"Higher prices typically reduce quantity demanded."},

function shuffleOptions(question){

let q = {
    q: question.q,
    options: [...question.options],
    a: question.a,
    feedback: question.feedback,
    hint: question.hint,
    tag: question.tag
};

let correct = q.options[q.a];

for(let i=q.options.length-1;i>0;i--){
let j=Math.floor(Math.random()*(i+1));
[q.options[i],q.options[j]]=[q.options[j],q.options[i]];
}

q.a = q.options.indexOf(correct);

return q;
}
    
function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

function getMUPerDollar() {
    const mu = Math.floor(Math.random() * 50) + 10;
    const price = [2, 5, 10][Math.floor(Math.random() * 3)];
    return {
        q: `A consumer receives MUx = ${mu} from good X. The price of X is $${price}. What is the Marginal Utility per dollar?`,
        options: [`${(mu/price).toFixed(1)}`, `${mu}`, `${price/mu}`, `${(mu*price)}`],
        a: 0, feedback:`MU per dollar = MU / Price = ${mu} / ${price} = ${(mu/price).toFixed(1)}`
    };
    
}

function getEquilibriumCheck() {
    const muX = Math.floor(Math.random() * 20) + 10;
    const pX = [2, 5][Math.floor(Math.random() * 2)];
    const ratio = muX / pX;
    // We want the student to find the MUy that satisfies MUx/Px = MUy/Py
    const pY = 10;
    const correctMUy = ratio * pY;
    
    return {
        q: `A consumer is in equilibrium. MUx = ${muX} and Px = $${pX}. If the price of Good Y (Py) is $${pY}, what must be the Marginal Utility of Good Y (MUy)?`,
        options: [`${correctMUy}`, `${correctMUy / 2}`, `${correctMUy + 10}`, `${muX}`],
        a: 0, feedback:`Consumer equilibrium requires MUx/Px = MUy/Py. ${muX}/${pX} = ${ratio}. So MUy must equal ${correctMUy}.`
    };
}
function getElasticityCalc() {

    const p1 = (Math.floor(Math.random() * 5) + 4) * 2;
    const p2 = p1 + 2;

    const q1 = (Math.floor(Math.random() * 5) + 8) * 10;
    const q2 = q1 - 20;

    const chgQ = q2 - q1;
    const midQ = (q1 + q2) / 2;
    const chgP = p2 - p1;
    const midP = (p1 + p2) / 2;

    const elasticityVal = Math.abs((chgQ / midQ) / (chgP / midP));
    const elasticity = elasticityVal.toFixed(2);

    // helper classifier
    function classify(val){
        if (val > 1) return "Elastic";
        if (val < 1) return "Inelastic";
        return "Unit Elastic";
    }

    const correct = `${elasticity} (${classify(elasticityVal)})`;

    const d1Val = elasticityVal * 0.7;
    const d2Val = elasticityVal * 1.3;
    const d3Val = Math.abs((chgQ / q1) / (chgP / p1));

    const d1 = `${d1Val.toFixed(2)} (${classify(d1Val)})`;
    const d2 = `${d2Val.toFixed(2)} (${classify(d2Val)})`;
    const d3 = `${d3Val.toFixed(2)} (${classify(d3Val)})`;

    let options = new Set();
    options.add(correct);
    options.add(d1);
    options.add(d2);
    options.add(d3);

    while (options.size < 4) {
        const fillerVal = Math.random() * 2 + 0.5;
        options.add(`${fillerVal.toFixed(2)} (${classify(fillerVal)})`);
    }

    options = Array.from(options);

    return {
        q: `When the price of a good increases from $${p1} to $${p2}, the quantity demanded decreases from ${q1} units to ${q2} units. Using the Midpoint (Arc) Method, what is the price elasticity of demand?`,
        options: options,
        a: options.indexOf(correct),
        hint: "Arc Elasticity = [(Q2-Q1)/((Q1+Q2)/2)] / [(P2-P1)/((P1+P2)/2)]",
        feedback: `Elasticity ≈ ${elasticity}. Demand is ${classify(elasticityVal)}.`
    };

    }
  
function getConsumerSurplusCalc() {
    const wtp = Math.floor(Math.random() * 20) + 40; // Higher WTP to ensure positive surplus
    const initialPrice = Math.floor(Math.random() * 10) + 20; // e.g., $20 - $30
    const priceDrop = Math.floor(Math.random() * 5) + 5; // e.g., $5 - $10 drop
    const finalPrice = initialPrice - priceDrop;

    // The increase in surplus is the difference between the price points
    // New Surplus (wtp - finalPrice) - Old Surplus (wtp - initialPrice) = initialPrice - finalPrice
    const surplusIncrease = initialPrice - finalPrice;

    return {
        q: `A buyer is willing to pay $${wtp} for a product. The market price falls from $${initialPrice} to $${finalPrice}. How much does the consumer surplus increase for this buyer?`,
        options: [
            `$${surplusIncrease}`, 
            `$${wtp - finalPrice}`, 
            `$${priceDrop + 10}`, 
            `$${wtp - initialPrice}`
        ],a: 0, feedback:`Consumer surplus increases by the change in price: ${initialPrice} - ${finalPrice} = ${surplusIncrease}.`
    };
    
}

    if (room === 26) return getMUPerDollar();

let pool = questionBanks[poolName]
let used = [
...usedQuestions.easy,
...usedQuestions.medium,
...usedQuestions.hard,
...usedQuestions.easyBoss,
...usedQuestions.mediumBoss,
...usedQuestions.finalBoss
]


let available = pool.filter(q => !used.includes(q.id))

if(available.length === 0){
usedQuestions[poolName] = []
available = pool
}

// Avoid three identical question types in a row
let filtered = available

if(lastTypes.length >= 2){
let last1 = lastTypes[lastTypes.length-1]
let last2 = lastTypes[lastTypes.length-2]

if(last1 === last2){
filtered = available.filter(q => q.type !== last1)
if(filtered.length === 0){
filtered = available
}
}
}

let question = filtered[Math.floor(Math.random()*filtered.length)]

usedQuestions[poolName].push(question.id)

// Track types
lastTypes.push(question.type)
if(lastTypes.length > 3){
lastTypes.shift()
}

return question
}

function shuffle(arr){
    for(let i = arr.length - 1; i > 0; i--){
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
}

let calcBag = [];

function pickCalcGenerator(){

    if(calcBag.length === 0){
        calcBag = shuffle([...calculationGenerators]);
    }

    return calcBag.pop();
}

function weightedPick(pool){

let weightedPool = [];

pool.forEach(q => {

let weight = 1;

if(q.tag && conceptMemory[q.tag]){
weight += conceptMemory[q.tag];
}

for(let i = 0; i < weight; i++){
weightedPool.push(q);
}

});

return weightedPool[Math.floor(Math.random()*weightedPool.length)];

}
  
function pickRandom(pool){
    if(!pool._remaining || pool._remaining.length === 0){
        pool._remaining = shuffle([...pool]);
    }
    return pool._remaining.pop();
}

                <button onclick="location.reload()" style="background:transparent; color:white; border:1px solid white; padding:12px 24px; border-radius:6px; cursor:pointer;">
                    Try Again
                </button>
            </div>
        </div>
    `;
}
  
function showKnowledgeRoom(bossRoom) {
    playExplorationMusic();  
  
    const qContainer = document.getElementById("question");
    const aContainer = document.getElementById("answers");
    const msgElement = document.getElementById("message");
  
  
    // Clear the "Correct!" fade-out text so it doesn't stay on the summary screen
    msgElement.innerText = "";
    msgElement.className = "";
    
    let title = "";
    let summary = "";

    if (bossRoom === 10) {
        title = "WARDEN OF INDIFFERENCE DEFEATED (Archive 10.1)";
        summary = "As the Warden fades you find the Seal of Preferences. Consumers have consistent preferences represented by indifference curves. They face trade-offs determined by their budget constraint. Optimal consumption occurs where the marginal rate of substitution equals the price ratio. The Labyrinth grows deeper...";
    } else if (bossRoom === 20) {
        title = "DECOMPOSER OF CHOICE DEFEATED (Archive 20.1)";
        summary = "With the Decomposer's defeat you claim the Artifcat of Price Effects. You have conquered the dual nature of price changes. You now distinguish between how price changes affect purchasing power (Income Effect) and relative attractiveness (Substitution Effect).";
    } else if (bossRoom === 30) {
        title = "SOVEREIGN OF ELASTICITY DEFEATED (Final Archive)";
        summary = "With the Sovereign finally beaten, you claim the Scepter of Elasticity. You have proven your mastery over Market Responsiveness and the mathematical laws that govern Demand, Elasticity, and Total Revenue.";
    }

    // Update the UI
    qContainer.innerHTML = `
        <span class="boss-title" style="color:#60a5fa; text-shadow: 0 0 15px #60a5fa;">${title}</span>
        <div class="boss-q" style="--bossColor:#60a5fa; font-style: normal; border-left-color: #60a5fa;">${summary}</div>
    `;
    
    // logic to ensure Room 30 triggers the end game, while 10 and 20 trigger the next level
    let nextAction = bossRoom === 30 ? "handleVictory()" : "room++; loadQuestion();";
    let buttonLabel = bossRoom === 30 ? "FINALIZE THE ARCHIVE CONQUEST →" : `CONTINUE TO ROOM ${bossRoom + 1} →`;

    aContainer.innerHTML = `
        <button onclick="${nextAction}" 
                style="background:#60a5fa; color:black; font-weight:bold; width:100%; padding:20px; font-size:18px; box-shadow: 0 0 20px rgba(96, 165, 250, 0.5); border:none; border-radius:8px; cursor:pointer;">
                ${buttonLabel}
        </button>`;
}
    
  
function shuffleArray(arr){
    for(let i=arr.length-1;i>0;i--){ let j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; }
    return arr;
}

function updateHighScores(newTimeMs) {
    let scores = JSON.parse(localStorage.getItem("gauntletHighScores")) || [];
    scores.push({ name: username, time: newTimeMs, date: new Date().toLocaleDateString() });
    
    // Sort by time (lowest/fastest first) and keep top 5
    scores.sort((a, b) => a.time - b.time);
    scores = scores.slice(0, 5);
    
    localStorage.setItem("gauntletHighScores", JSON.stringify(scores));
    return scores;
}

function formatTime(ms) {
    let mins = Math.floor(ms / 60000);
    let secs = Math.floor((ms / 1000) % 60);
    return `${mins}m ${secs}s`;
}

function copyResults() {
    const totalTimeMs = Date.now() - startTime;
    const timeString = formatTime(totalTimeMs);
    const code = document.getElementById("vCode").innerText;
    const accuracy = Math.round((correctAnswers / totalAttempts) * 100);
    const shareText = `🎮 Labyrinth of Choice Conquered!\n👤 Adventurer: ${username}\n⏱️ Time: ${timeString}\n🎯 Accuracy: ${accuracy}%\n🔥 Best Streak: ${maxStreak}\n📝 Total Questions: ${totalAttempts}\n🔑 Verification Code: ${code}`;
    
    navigator.clipboard.writeText(shareText).then(() => {
        const btn = document.getElementById("shareBtn");
        const originalText = btn.innerText;
        btn.innerText = "✅ Copied to Clipboard!";
        btn.style.background = "#059669";
        setTimeout(() => {
            btn.innerText = originalText;
            btn.style.background = "#374151";
        }, 2000);
    });
}
