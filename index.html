<!DOCTYPE html>
<html>
<head>
<title>The Archives of Microeconomics</title>
<style>
body{
font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;

    /* The Background: Dark overlay + Your Image */
    background: 
        linear-gradient(rgba(2, 6, 23, 0.8), rgba(2, 6, 23, 0.8)), 
        url('question_background_image.jpeg');
    
    background-size: cover;
    background-position: center;
    background-attachment: fixed; /* Keeps the image from scrolling with the page */
    color: white;
    text-align: center;
}
@keyframes torchFlicker {
0%   { filter: brightness(1); }
25%  { filter: brightness(1.05); }
50%  { filter: brightness(0.97); }
75%  { filter: brightness(1.04); }
100% { filter: brightness(1); }
}
#gameBox{
width:750px;
margin:auto;
margin-top:40px;
padding:30px;
background:#111827;
border-radius:14px;
box-shadow: 0 0 40px rgba(0,0,0,0.8), 0 0 20px rgba(251, 191, 36, 0.1), inset 0 0 30px rgba(0,0,0,0.6);
border:1px solid rgba(255,255,255,0.05);
animation: torchFlicker 6s infinite;
transition: box-shadow 0.3s ease;
position: relative;
}
.hit { box-shadow: 0 0 60px #ef4444, inset 0 0 40px #7f1d1d !important; animation: shake 0.4s ease; }
#autosave { position: absolute; top: 15px; right: 15px; font-size: 11px; opacity: 0.5; font-style: italic; }
button{
padding:12px 22px; margin:8px; font-size:16px; cursor:pointer;
background:#374151; color:white; border:none; border-radius:8px; transition:all 0.2s ease;
}
button:hover{ background:#4b5563; transform:translateY(-2px); }
h2{ text-shadow: 0 0 10px rgba(255,255,255,0.3), 0 0 20px rgba(251,191,36,0.2); margin-bottom: 5px;}
#mazeTrack{ font-size:22px; line-height:32px; letter-spacing:2px; margin-bottom:10px; display: inline-block; text-shadow:0 0 10px rgba(34,197,94,0.6); }
#progressBar{ width:100%; height:22px; background:#2d3748; border-radius:12px; margin-bottom:20px; overflow:hidden; }
#progressFill{ height:100%; width:0%; background:linear-gradient(90deg,#f59e0b,#ef4444); transition:width 0.4s ease; }
.boss-title { font-size: 28px; font-weight: bold; margin-bottom: 15px; display: block; }
.boss-q { font-style: italic; font-size: 19px; border-left: 4px solid var(--bossColor); padding-left: 15px; margin: 20px 0; text-align: left; }
.area-title { color: #9ca3af; font-size: 14px; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 15px; }
.hint-box { font-size: 13px; color: #fbbf24; margin-top: 15px; opacity: 0.8; height: 18px; }

@keyframes shake { 0% { transform:translateX(0); } 25% { transform:translateX(-8px); } 50% { transform:translateX(8px); } 75% { transform:translateX(-6px); } 100% { transform:translateX(0); } }
@keyframes victoryGlow { 0% { transform:scale(1); text-shadow:0 0 10px gold; } 50% { transform:scale(1.1); text-shadow:0 0 25px gold, 0 0 40px orange; } 100% { transform:scale(1); text-shadow:0 0 10px gold; } }
.victory{ animation:victoryGlow 1.5s ease-in-out infinite; color: gold !important; }  
  .dungeon-container {
    position: relative;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding-top: 40px;
}

.fade-out-text {
    animation: fadeOut 5s forwards;
    font-weight: bold;
    color: #4ade80; /* A nice success green */
}

@keyframes fadeOut {
    0% { opacity: 1; }
    70% { opacity: 1; } /* Stay fully visible for 3.5 seconds */
    100% { opacity: 0; } /* Fade out over the last 1.5 seconds */
}
  
#question {
    font-size: 20px; /* Increased from your current size */
    line-height: 1.4;
    font-weight: 500;
    margin: 20px 0;
    text-shadow: 0 2px 4px rgba(0,0,0,0.5); /* Adds depth for readability */
}

/* Also updating the Boss question text specifically */
.boss-q {
    font-style: italic;
    font-size: 24px; /* Matching the new standard size */
    border-left: 4px solid var(--bossColor);
    padding-left: 15px;
    margin: 20px 0;
    text-align: left;
}
  
#mazeTrack {
    display: grid;
    grid-template-columns: repeat(10, 1fr); /* 10 columns per row */
    gap: 12px;
    max-width: 500px;
    margin: 25px auto;
}

.maze-box {
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    border-radius: 6px;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.1);
    transition: all 0.3s ease;
}

/* The "Staircase" effect: Shifting the middle row (11-20) to the right */
.maze-box:nth-child(n+11):nth-child(-n+20) {
    transform: translateX(20px);
}

.maze-box.active {
    background: rgba(251, 191, 36, 0.3);
    border: 2px solid #fbbf24;
    z-index: 10;
    animation: activePulse 0.8s infinite alternate;
}
  
@keyframes activePulse {
    0% { box-shadow: 0 0 5px #fbbf24; transform: scale(1.1); }
    100% { box-shadow: 0 0 20px #fbbf24; transform: scale(1.2); }
}

.maze-box.active {
    background: rgba(251, 191, 36, 0.3);
    border: 2px solid #fbbf24;
    z-index: 10;
    animation: activePulse 0.8s infinite alternate;
}
  
/* Gives a faint, constant aura to the boss rooms */
.maze-box:nth-child(10) { text-shadow: 0 0 5px #fbbf24; }
.maze-box:nth-child(20) { text-shadow: 0 0 10px #a855f7; }
.maze-box:nth-child(30) { text-shadow: 0 0 15px #ef4444; }
  
#gameBox.boss-mode {
    border: 2px solid #ef4444;
    box-shadow: 0 0 50px rgba(239, 68, 68, 0.4), inset 0 0 20px rgba(239, 68, 68, 0.2);
}
   
.torch {
    position: absolute;
    width: 90px;
    top: 100px;
    z-index: 10;
    animation: torchFlicker 3s infinite alternate;
}

.left-torch { left: calc(50% - 475px); }
.right-torch { right: calc(50% - 475px); transform: scaleX(-1); }

#startScreen {
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 100%;
background-image: url('start_screen_image.png'); 
background-size: cover; 
background-position: center; 
background-repeat: no-repeat;
z-index: 100;
display: flex;
flex-direction: column;
justify-content: center;
align-items: center;
text-align: center;
}


</style>
</head>
<body>
<div id="startScreen">
    <h1 style="color:rgb(48, 187, 221); text-shadow:0 0 30px rgb(48, 187, 221); font-size:60px; margin-bottom:10px;">THE ARCHIVES OF MICROECONOMICS</h1>
    <h2 style="color:rgb(51, 140, 178); text-shadow:0 0 20px rgb(51, 140, 178); font-size:40px; margin-bottom:50px;">THE LABYRINTH OF CHOICE</h2>
    <p style="color:#c4cad3; letter-spacing:2px; margin-bottom:30px; font-style:italic;">Identify yourself, Adventurer</p>
    <input type="text" id="usernameInput" placeholder="Enter Name..." style="padding:15px; border-radius:8px; border:1px solid #374151; background:#1f2937; color:white; font-size:20px; margin-bottom:20px; text-align:center; outline:none; width:300px; box-shadow: 0 0 15px rgba(0,0,0,0.5);">
    <button onclick="startGame()" style="background:#30bbdd; color:#000; font-weight:bold; padding:15px 50px; font-size:20px; cursor:pointer; border-radius:8px; border:none; transition: transform 0.2s;">ENTER THE ARCHIVES</button>
</div>
    <div class="dungeon-container">
    <img src="torch.gif" class="torch left-torch">
<div id="gameBox">
    <div id="autosave">💾 Progress Autosaved</div>
    <h2>The Labyrinth of Choice</h2>
    <p id="areaDisplay" class="area-title"></p>
    <div id="progressBar"><div id="progressFill"></div></div>
    <div id="mazeTrack"></div>
     <div id="streakDisplay" style="font-weight:bold; color:#60a5fa; height:24px; margin-top:5px;"></div>
    <p id="bossMessage"></p>
    <div id="questionContainer">
        <p id="question"></p>
        <div id="formulaHint" class="hint-box"></div>
    </div>
    <div id="answers"></div>
    <p id="message"></p>
</div>
     <img src="torch.gif" class="torch right-torch">
</div>
<script>
const bgMusic = new Audio('545057__szegvari__monk-chant-fantasy.wav'); 
bgMusic.loop = true; 
bgMusic.volume = 0.1; 

const sfxMilestone = new Audio('387232__steaq__badge-coin-win.wav');
const sfxVictory = new Audio('220184__gameaudio__win-spacey.wav');

// 1. Initial UI State: Hide game until startGame runs
document.getElementById("gameBox").style.display = "none";
document.querySelectorAll(".torch").forEach(t => t.style.display = "none");

// 2. Global Variables (Declared only ONCE)
let totalAttempts = 0;
let bossHealth = 3; 
let bossPool = [];
let correctAnswers = 0; 
let maxStreak = 0; 
let username = "";
let streak = 0; 
let startTime; // Will be set in startGame()
let room = localStorage.getItem("gauntletRoom") ? parseInt(localStorage.getItem("gauntletRoom")) : 1;
let currentQuestion = null;

// 3. Entry Logic
function startGame() {
    let inputName = document.getElementById("usernameInput").value.trim();
    if (!inputName) {
        alert("A name is required to bind your soul to the archives.");
        return;
    }
    
    username = inputName;
    localStorage.setItem("gauntletUser", username);
    
    // Reveal the game and torches
    document.getElementById("startScreen").style.display = "none";
    document.getElementById("gameBox").style.display = "block";
    document.querySelectorAll(".torch").forEach(t => t.style.display = "block");
    
    // Start atmosphere and timer
    bgMusic.play().catch(e => console.log("Audio started"));
    startTime = Date.now(); 
    loadQuestion();
}

// 4. Enter Key Support
document.getElementById("usernameInput").addEventListener("keypress", function(event) {
    if (event.key === "Enter") {
        event.preventDefault();
        startGame();
    }
});

// 5. Your Lore & Logic (Area Names)
function getAreaName(r) {
    if (r <= 9) return "The Dimly Lit Archives";
    if (r === 10) return "The Warden's Gate";
    if (r <= 19) return "The Hall of Substitutions";
    if (r === 20) return "The Decomposer's Lair";
    if (r <= 25) return "The Vault of Elasticity";
    if (r <= 29) return "The Calculations Corridor";
    return "The Sovereign's Throne";
}

// --- Question Pools follow below ---
const questionBanks = {
    easyBoss:[
        {q:"A consumer maximizes utility when...",options:["The marginal rate of substitution equals the price ratio","Income is completely spent","Utility is highest possible","Prices are equal across goods"],a:0,feedback:"Utility maximization occurs where the marginal rate of substitution equals the price ratio."},
        {q:"A consumer's marginal utilities are MUx = 24 and MUy = 12. The price of X is $6 and the price of Y is $3. Is the consumer currently maximizing utility?",options:["Yes, the consumer is in equilibrium","No, the consumer should buy more X","No, the consumer should buy more Y","Not enough information"],a:0,feedback:"MUx/Px = 24/6 = 4 and MUy/Py = 12/3 = 4. Since marginal utility per dollar is equal, the consumer is maximizing utility."},
        {q:"A consumer has MUx/Px = 6 and MUy/Py = 3. What adjustment should the consumer make to maximize utility?",options:["Buy more X and less Y","Buy more Y and less X","Buy equal amounts of both goods","Reduce consumption of both goods"],a:0,feedback:"Consumers increase consumption of the good with the higher marginal utility per dollar until the ratios equalize."}
    ],
    mediumBoss:[
        {q:"If the substitution effect and income effect move in opposite directions, and the substitution effect is stronger, the good is...",options:["Normal","Inferior (non-Giffen)","A Giffen good","A perfect complement"],a:1},
        {q:"When the price of a normal good falls, which combination of effects explains the change in quantity demanded?",options:["Substitution effect increases demand and income effect increases demand","Substitution effect increases demand and income effect decreases demand","Substitution effect decreases demand and income effect increases demand","Both effects decrease demand"],a:0,feedback:"For normal goods, both substitution and income effects increase quantity demanded when price falls."},
        {q:"When the price of an inferior good falls, the substitution effect and income effect...",options:["Work in opposite directions","Both increase demand","Both decrease demand","Eliminate demand"],a:0,feedback:"The substitution effect increases demand, but the income effect reduces demand for inferior goods."}
    ],
    finalBoss:[
        {q:"A firm observes that when it lowers price, total revenue rises. What must be true about demand at the original price?",options:["Demand was elastic","Demand was inelastic","Demand was perfectly inelastic","Demand was unit elastic"],a:0},
        {q:"The price of a product rises from $10 to $12 and quantity demanded falls from 100 to 80. Using the midpoint method, what happens to total revenue?",options:["Total revenue decreases","Total revenue increases","Total revenue stays the same","Total revenue becomes zero"],a:0,feedback:"Elasticity ≈ 1.22 (elastic). When demand is elastic, price increases reduce total revenue."},
        {q:"A consumer faces Px = $4 and Py = $2. If MUx = 32, what must MUy equal for the consumer to be in equilibrium?",options:["16","8","32","4"],a:0,feedback:"Equilibrium requires MUx/Px = MUy/Py. 32/4 = 8, so MUy/2 = 8 → MUy = 16."}              
    ],
    easy: [
        {q:"A theory of choice assumes individuals...",options:["Make random decisions","Choose the most preferred affordable bundle","Always maximize income","Always minimize work"],a:1,feedback:"Consumers choose the most preferred bundle they can afford given their budget constraint."},
{q:"Consumer preferences are typically represented using...",options:["Demand curves","Indifference curves","Supply curves","Cost curves"],a:1,feedback:"Indifference curves show combinations of goods that give the consumer the same level of satisfaction."},
{q:"Indifference curves represent...",options:["Bundles giving equal utility","Bundles giving equal price","Bundles giving equal income","Bundles giving equal production"],a:0,feedback:"Each point on an indifference curve provides the same level of utility to the consumer."},
{q:"If a consumer prefers bundle A to bundle B and B to C, preferences are...",options:["Complete","Transitive","Non-rational","Random"],a:1,feedback:"Transitivity means consistent ranking: if A > B and B > C, then A > C."},
{q:"The slope of the budget constraint reflects...",options:["Relative prices of goods","Income level","Utility level","Demand elasticity"],a:0,feedback:"The slope equals the price ratio between the two goods."},
{q:"If income increases, the budget constraint...",options:["Rotates","Shifts outward","Shifts inward","Becomes vertical"],a:1,feedback:"Higher income allows consumers to afford more of both goods."},
{q:"If the price of good X increases, the budget line...",options:["Rotates inward on the X-axis","Shifts outward","Rotates outward","Does not change"],a:0,feedback:"A higher price reduces how much X can be purchased, causing the budget line to rotate inward."},
{q:"Consumers maximize utility where...",options:["Indifference curve is tangent to budget line","Income is highest","Prices are equal","Demand is highest"],a:0,feedback:"Utility is maximized where the marginal rate of substitution equals the price ratio."},
{q:"Marginal rate of substitution represents...",options:["Rate consumers trade one good for another","Price ratio","Income ratio","Demand elasticity"],a:0,feedback:"The MRS shows how much of one good a consumer is willing to give up for another."},
{q:"A complete preference ordering means...",options:["Consumers can compare any two bundles","Consumers always prefer cheaper goods","Consumers never change preferences","Consumers prefer equal bundles"],a:0,feedback:"Completeness means any two bundles can be ranked by the consumer."},
{q:"Transitive preferences imply...",options:["If A is preferred to B and B to C, then A is preferred to C","Consumers prefer cheaper goods","Income increases utility automatically","Demand curves shift"],a:0,feedback:"Transitivity ensures preferences are logically consistent."},
{q:"If two bundles lie on the same indifference curve...",options:["They provide equal utility","They cost the same","They contain equal goods","They maximize income"],a:0,feedback:"All bundles on the same indifference curve provide the same satisfaction."},
{q:"Indifference curves are typically downward sloping because...",options:["Consumers trade one good for another","Prices fall","Income increases","Demand increases"],a:0,feedback:"To keep utility constant, more of one good requires giving up some of the other."},
{q:"Convex indifference curves imply...",options:["Diminishing marginal rate of substitution","Increasing marginal cost","Constant utility","Perfect substitutes"],a:0,feedback:"Convex curves reflect diminishing willingness to substitute one good for another."},
{q:"If the price of good X falls, the budget constraint...",options:["Rotates outward on the X-axis","Shifts outward parallel","Shifts inward","Becomes vertical"],a:0,feedback:"A lower price lets consumers buy more of good X."},
{q:"Bundles outside the budget constraint are...",options:["Unaffordable","Optimal","Preferred","Efficient"],a:0,feedback:"Points outside the budget line cost more than the consumer can afford."},
{q:"Bundles inside the budget constraint are...",options:["Affordable but not utility maximizing","Impossible","Always optimal","Always inefficient"],a:0,feedback:"These bundles are affordable but may not maximize utility."},
{q:"A bundle of goods refers to...",options:["A set of goods a consumer may consume","A firm's production level","Total market demand","A supply schedule"],a:0,feedback:"A bundle is simply a combination of goods a consumer chooses."},
{q:"Utility refers to...",options:["Satisfaction a consumer receives","Total income","Market demand","Firm profit"],a:0,feedback:"Utility measures the satisfaction a consumer receives from consumption."},
{q:"The budget constraint shows...",options:["All affordable combinations of goods","Only preferred bundles","Production possibilities","Market equilibrium"],a:0,feedback:"The budget constraint shows what a consumer can afford given income and prices."},
{q:"If both goods become cheaper, the budget line...",options:["Shifts outward","Rotates inward","Becomes vertical","Does not change"],a:0,feedback:"Lower prices increase purchasing power for both goods."},
{q:"Consumer surplus measures...",options:["Difference between willingness to pay and price","Firm profits","Producer costs","Market revenue"],a:0,feedback:"Consumer surplus is the extra benefit buyers receive when paying less than they were willing to pay."},
{q:"Market demand is obtained by...",options:["Summing individual demand curves horizontally","Summing vertically","Multiplying prices","Averaging costs"],a:0,feedback:"Market demand adds together the quantities demanded by all consumers at each price."},
{q:"Price elasticity of demand measures...",options:["Responsiveness of quantity demanded to price change","Firm profit","Consumer income","Market supply"],a:0,feedback:"Elasticity shows how sensitive quantity demanded is to price changes."},
{q:"Demand represents...",options:["Quantity consumers are willing and able to buy at different prices","Total production of firms","Government price controls","Consumer income levels"],a:0,feedback:"Demand reflects willingness and ability to purchase at various prices."},
{q:"A demand curve typically slopes...",options:["Downward","Upward","Vertically","Perfectly flat"],a:0,feedback:"As price rises, consumers typically buy less."},
{q:"When price increases, quantity demanded typically...",options:["Falls","Rises","Stays constant","Becomes infinite"],a:0,feedback:"Higher prices discourage consumption."},
{q:"Consumer surplus is highest when...",options:["Price is much lower than willingness to pay","Price equals cost","Income falls","Demand disappears"],a:0,feedback:"The bigger the gap between willingness to pay and price, the larger the surplus."},
{q:"If many consumers enter a market, market demand will...",options:["Increase","Decrease","Remain unchanged","Become perfectly inelastic"],a:0,feedback:"More buyers increase total demand in the market."},
{q:"If two goods are substitutes, an increase in the price of one good will...",options:["Increase demand for the other good","Decrease demand for the other good","Not affect demand","Eliminate demand"],a:0,feedback:"When one substitute becomes expensive, consumers switch to the other."},
{q:"If two goods are complements, an increase in the price of one good will...",options:["Decrease demand for the other good","Increase demand for the other good","Have no effect","Make demand perfectly elastic"],a:0,feedback:"Complements are used together, so higher price reduces demand for both."}
      ],
    medium: [
        {q:"An individual demand curve is derived from...",options:["Budget constraints only","Optimal consumption bundles at different prices","Utility levels only","Production functions"],a:1,feedback:"A demand curve traces the optimal bundle chosen at different prices."},
{q:"When price falls, the optimal bundle typically moves...",options:["Along the demand curve","Off the demand curve","To a different market","Randomly"],a:0,feedback:"Price changes move consumers along the demand curve."},
{q:"A price change affects consumption through...",options:["Income and substitution effects","Supply effects","Production effects","Random effects"],a:0,feedback:"Price changes affect choices through substitution and income effects."},
{q:"The substitution effect occurs because...",options:["Relative prices change","Income changes","Preferences change","Demand shifts"],a:0,feedback:"The substitution effect occurs because relative prices change."},
{q:"If a good is normal, an income increase causes demand to...",options:["Increase","Decrease","Stay constant","Disappear"],a:0,feedback:"Normal goods are purchased more as income rises."},
{q:"If a good is inferior, an income increase causes demand to...",options:["Increase","Decrease","Stay constant","Become vertical"],a:1,feedback:"Inferior goods are purchased less as income rises."},
{q:"Demand shifts outward when...",options:["Income rises for a normal good","Price increases","Technology improves","Costs rise"],a:0,feedback:"Higher income increases demand for normal goods."},
{q:"A demand curve shifts when...",options:["Income or preferences change","Price changes","Supply changes","Markets disappear"],a:0,feedback:"Changes in income or preferences shift demand."},
{q:"The substitution effect of a price decrease always...",options:["Increases quantity demanded","Decreases quantity demanded","Has no effect","Depends on income"],a:0,feedback:"Lower prices make the good relatively more attractive."},
{q:"The income effect of a price decrease for a normal good...",options:["Increases quantity demanded","Decreases quantity demanded","Has no effect","Reduces welfare"],a:0,feedback:"Lower prices increase purchasing power."},
{q:"For an inferior good, the income effect of a price decrease...",options:["Reduces quantity demanded","Increases quantity demanded","Is always zero","Creates surplus"],a:0,feedback:"Higher purchasing power reduces demand for inferior goods."},
{q:"A Giffen good occurs when...",options:["Income effect outweighs substitution effect","Substitution effect dominates","Demand becomes perfectly elastic","Income rises"],a:0,feedback:"Giffen goods occur when the income effect dominates the substitution effect."},
{q:"If income rises and demand increases, the good is...",options:["Normal","Inferior","Elastic","Substitute"],a:0,feedback:"Normal goods see higher demand as income rises."},
{q:"If the price of coffee rises and demand for tea increases, the goods are...",options:["Substitutes","Complements","Inferior","Normal"],a:0,feedback:"Substitutes replace each other when prices change."},
{q:"If the price of printers rises and demand for ink falls, the goods are...",options:["Complements","Substitutes","Inferior","Giffen"],a:0,feedback:"Complements are used together, so demand moves together."},
{q:"The marginal rate of substitution equals...",options:["Slope of the indifference curve","Slope of the budget line","Income divided by price","Demand elasticity"],a:0,feedback:"The MRS equals the slope of the indifference curve."},
{q:"Consumer equilibrium occurs when...",options:["MRS equals price ratio","Utility is zero","Income is maximized","Demand equals supply"],a:0,feedback:"Consumers maximize utility where MRS equals the price ratio."},
{q:"A normal good is one where...",options:["Demand rises as income rises","Demand falls as income rises","Price always rises","Utility is constant"],a:0,feedback:"Normal goods are purchased more as income rises."},
{q:"An inferior good is one where...",options:["Demand falls as income rises","Price falls with income","Utility decreases","Consumers avoid it"],a:0,feedback:"Inferior goods are purchased less as income rises."},
{q:"A steeper budget line means...",options:["One good has become relatively more expensive","Income increased","Utility increased","Demand increased"],a:0,feedback:"The slope reflects the price ratio between goods."},
{q:"A steeper indifference curve indicates...",options:["Higher willingness to trade Y for X","Lower utility","Higher income","Lower demand"],a:0,feedback:"A steeper curve means the consumer values X more relative to Y."},
{q:"If the marginal rate of substitution exceeds the price ratio...",options:["The consumer should consume more of good X","The consumer should consume less of good X","Utility falls","Income changes"],a:0,feedback:"If MRS is higher than the price ratio, X provides more utility per dollar."},
{q:"Utility maximization occurs where...",options:["MRS equals the price ratio","Demand equals supply","Income equals spending","Marginal utility is zero"],a:0,feedback:"Utility is maximized where MRS equals the price ratio."},

],
hard: [

function shuffleOptions(question){

let q = {
    q: question.q,
    options: [...question.options],
    a: question.a,
    feedback: question.feedback,
    hint: question.hint
};

let correct = q.options[q.a];

for(let i=q.options.length-1;i>0;i--){
let j=Math.floor(Math.random()*(i+1));
[q.options[i],q.options[j]]=[q.options[j],q.options[i]];
}

q.a = q.options.indexOf(correct);

return q;
}
    
function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

function getMUPerDollar() {
    const mu = Math.floor(Math.random() * 50) + 10;
    const price = [2, 5, 10][Math.floor(Math.random() * 3)];
    return {
        q: `A consumer receives MUx = ${mu} from good X. The price of X is $${price}. What is the Marginal Utility per dollar?`,
        options: [`${(mu/price).toFixed(1)}`, `${mu}`, `${price/mu}`, `${(mu*price)}`],
        a: 0, feedback:`MU per dollar = MU / Price = ${mu} / ${price} = ${(mu/price).toFixed(1)}`
    };
    
}

function getEquilibriumCheck() {
    const muX = Math.floor(Math.random() * 20) + 10;
    const pX = [2, 5][Math.floor(Math.random() * 2)];
    const ratio = muX / pX;
    // We want the student to find the MUy that satisfies MUx/Px = MUy/Py
    const pY = 10;
    const correctMUy = ratio * pY;
    
    return {
        q: `A consumer is in equilibrium. MUx = ${muX} and Px = $${pX}. If the price of Good Y (Py) is $${pY}, what must be the Marginal Utility of Good Y (MUy)?`,
        options: [`${correctMUy}`, `${correctMUy / 2}`, `${correctMUy + 10}`, `${muX}`],
        a: 0, feedback:`Consumer equilibrium requires MUx/Px = MUy/Py. ${muX}/${pX} = ${ratio}. So MUy must equal ${correctMUy}.`
    };
    
}
function getElasticityCalc() {
    // Generate two price points
    const p1 = (Math.floor(Math.random() * 5) + 4) * 2; // e.g., $8, $10, $12
    const p2 = p1 + 2; // e.g., $10, $12, $14
    
    // Generate two quantity points (Inverse relationship)
    const q1 = (Math.floor(Math.random() * 5) + 8) * 10; // e.g., 80, 90, 100
    const q2 = q1 - 20; // e.g., 60, 70, 80

    // Midpoint Formula calculation
    const chgQ = q2 - q1;
    const midQ = (q1 + q2) / 2;
    const chgP = p2 - p1;
    const midP = (p1 + p2) / 2;

    // Elasticity = |(ΔQ / midQ) / (ΔP / midP)|
    const elasticityVal = Math.abs((chgQ / midQ) / (chgP / midP));
    const elasticity = elasticityVal.toFixed(2);


    let label = "";
    if (elasticityVal > 1) {
        label = "Elastic";
    } else if (elasticityVal < 1) {
        label = "Inelastic";
    } else {
        label = "Unit Elastic";
    }

return {
        q: `When the price of a good increases from $${p1} to $${p2}, the quantity demanded decreases from ${q1} units to ${q2} units. Using the Midpoint (Arc) Method, what is the price elasticity of demand?`,
        options: [
            `${elasticity} (${label})`, 
            `${(1/elasticityVal).toFixed(2)}`, 
            `${(Math.abs(chgQ)/q1 / (chgP/p1)).toFixed(2)}`, // Distractor: simple % change
            "1.00 (Unit Elastic)"
        ],
        a: 0,
        hint: "Arc Elasticity = [(Q2-Q1) / ((Q1+Q2)/2)] / [(P2-P1) / ((P1+P2)/2)]", feedback:`Arc Elasticity = [(Q2-Q1)/((Q1+Q2)/2)] / [(P2-P1)/((P1+P2)/2)]. Elasticity ≈ ${elasticity}.`
    };
    
}

function getConsumerSurplusCalc() {
    const wtp = Math.floor(Math.random() * 20) + 40; // Higher WTP to ensure positive surplus
    const initialPrice = Math.floor(Math.random() * 10) + 20; // e.g., $20 - $30
    const priceDrop = Math.floor(Math.random() * 5) + 5; // e.g., $5 - $10 drop
    const finalPrice = initialPrice - priceDrop;

    // The increase in surplus is the difference between the price points
    // New Surplus (wtp - finalPrice) - Old Surplus (wtp - initialPrice) = initialPrice - finalPrice
    const surplusIncrease = initialPrice - finalPrice;

    return {
        q: `A buyer is willing to pay $${wtp} for a product. The market price falls from $${initialPrice} to $${finalPrice}. How much does the consumer surplus increase for this buyer?`,
        options: [
            `$${surplusIncrease}`, 
            `$${wtp - finalPrice}`, 
            `$${priceDrop + 10}`, 
            `$${wtp - initialPrice}`
        ],a: 0, feedback:`Consumer surplus increases by the change in price: ${initialPrice} - ${finalPrice} = ${surplusIncrease}.`
    };
    
}

const calculationGenerators = [
    getMUPerDollar,
    getEquilibriumCheck,
    getElasticityCalc,
    getConsumerSurplusCalc
];
    
// Keep track of the last few questions to prevent repeats
let questionHistory = {
easy: [], medium: [], hard: [], calculation: [],
easyBoss: [], mediumBoss: [], finalBoss: []
};

function randomQuestion(poolName) {
    // --- SPECIAL CALCULATED ROOMS (26-29) ---
    // These ensure the student practices specific math skills before the boss
    if (room === 26) return getMUPerDollar();
    if (room === 27) return getEquilibriumCheck();
    if (room === 28) return getConsumerSurplusCalc();
    if (room === 29) return getElasticityCalc();

    let pool = questionBanks[poolName];
    let history = questionHistory[poolName];
    let selected;

    // Filter out recently used questions
    let available = pool.filter(q => !history.includes(q));

    // If we ran out of "new" questions, clear history and start over
    if (available.length === 0) {
        history.length = 0; 
        available = pool;
    }

    selected = available[Math.floor(Math.random() * available.length)];
    
    // Add to history and keep history size manageable (e.g., last 5 questions)
    history.push(selected);
    if (history.length > 5) history.shift();

    return selected;
}

function updateMazeTrack() {
    const track = document.getElementById("mazeTrack");
    track.innerHTML = ""; // Clear the old grid
    
    for (let i = 1; i <= 30; i++) {
        const box = document.createElement("div");
        box.className = "maze-box";
        
        // Determine the icon and state
        if (i < room) {
            box.innerText = "🟩";
            box.style.opacity = "0.6";
        } else if (i === room) {
            box.classList.add("active"); // Trigger the gold pulse
            box.innerText = "🟥";
        } else {
            // Boss icons for future rooms
            if (i === 10) box.innerText = "⚔";
            else if (i === 20) box.innerText = "👹";
            else if (i === 30) box.innerText = "👑";
            else box.innerText = "⬛";
        }
        
        track.appendChild(box);
    }
}

function shuffle(arr){
    for(let i = arr.length - 1; i > 0; i--){
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
}

function pickRandom(pool){
    if(!pool._remaining || pool._remaining.length === 0){
        pool._remaining = shuffle([...pool]);
    }
    return pool._remaining.pop();
}
    
function loadQuestion() {
    updateMazeTrack();
    const questionElement = document.getElementById("question");
    const msgElement = document.getElementById("message");
    const gameBox = document.getElementById("gameBox");
    const bossMsg = document.getElementById("bossMessage");

    // 1. Determine Difficulty and Boss Status
    let diff = (room <= 9) ? "easy" : (room === 10) ? "easyBoss" : (room <= 19) ? "medium" : (room === 20) ? "mediumBoss" : (room <= 25) ? "hard" : (room <= 29) ? "calculation" : "finalBoss";
    const isBoss = diff.includes("Boss");
    
    // 2. UI & Progress Updates
    gameBox.classList.toggle("boss-mode", isBoss);
    document.getElementById("progressFill").style.width = (room / 30 * 100) + "%";
    document.getElementById("areaDisplay").innerText = `${getAreaName(room)} (${room}/30)`;

    // 3. Select the Question
    if (isBoss) {
        if (bossHealth === 3) {
            const pool = questionBanks[diff];
            bossPool = shuffle([...pool]);
        }
        currentQuestion = bossPool[3 - bossHealth];
        
        let bTitle = room === 10 ? "WARDEN OF INDIFFERENCE" : room === 20 ? "THE DECOMPOSER OF CHOICE" : "SOVEREIGN OF ELASTICITY";
        let bColor = room === 10 ? "#fbbf24" : room === 20 ? "#a855f7" : "#ef4444";
        
        bossMsg.innerText = "⚠ BOSS ENCOUNTER ⚠";
        bossMsg.style.color = bColor;
        gameBox.style.setProperty('--bossColor', bColor);
        questionElement.innerHTML = `<span class="boss-title" style="color:${bColor}">${bTitle}</span><div class="boss-q" style="--bossColor:${bColor}">${currentQuestion.q}</div>`;
    } else {
if(diff === "calculation"){
    const generator = calculationGenerators[
        Math.floor(Math.random() * calculationGenerators.length)
    ];
    currentQuestion = shuffleOptions(generator());
}
else{
    const pool = questionBanks[diff];
currentQuestion = shuffleOptions(
    pickRandom(pool)
    );
}
        bossMsg.innerText = (room === 9 || room === 19 || room === 29) ? "⚠️ DANGER: BOSS DETECTED IN NEXT ROOM ⚠️" : "";
        bossMsg.style.color = "#ef4444";
        questionElement.innerText = currentQuestion.q;
    }

    // 4. Update Hints and Draw Buttons
    document.getElementById("formulaHint").innerText = currentQuestion.hint ? "💡 Hint: " + currentQuestion.hint : "";
    displayQuestion();
}
    
function displayQuestion() {
    const optionsElement = document.getElementById("answers");
    optionsElement.innerHTML = "";

    currentQuestion.options.forEach((option, index) => { 
        const btn = document.createElement("button");
        btn.innerText = option;
        btn.onclick = () => answer(index);
        optionsElement.appendChild(btn);
    });
}
    
function answer(choice) {
    totalAttempts++;
    const msgElement = document.getElementById("message");
    if (bgMusic.paused) bgMusic.play();

    if (choice === currentQuestion.a) {
        correctAnswers++;
        streak++;
        if (streak > maxStreak) maxStreak = streak;
        handleStreakVisuals();

        if (room === 10 || room === 20 || room === 30) {
            bossHealth--;
            if (bossHealth > 0) {
                sfxMilestone.play(); 
                msgElement.innerHTML = `<span class='fade-out-text' style='color:#f87171;'>HIT! Boss Health: ${bossHealth}/3</span>`;
                loadQuestion(); // Refresh to next boss question
                return; 
            } else {
                showKnowledgeRoom(room);
                bossHealth = 3;
                return;
            }
        }

        const feedbackText = "Correct! " + currentQuestion.feedback + " Moving deeper...";
        msgElement.innerHTML = `<span class='fade-out-text'>${feedbackText}</span>`;
        room++;
        localStorage.setItem("gauntletRoom", room);
        setTimeout(loadQuestion, 1000); // Small delay to read feedback
    } else {
        streak = 0;
        document.getElementById("streakDisplay").innerText = "";
        bossHealth = 3; // Reset boss health on fail
        
        room = Math.max(1, room - (room % 10 === 0 ? 3 : (room >= 21 ? 2 : 1)));
        localStorage.setItem("gauntletRoom", room);
        alert(`Incorrect! You trip in the darkness and tumble back to Room ${room}.`);
        loadQuestion();
    }
}
    
// Helper to keep the answer function clean
function handleStreakVisuals() {
    let streakMsg = "";
    let streakColor = "#60a5fa";

    if (streak === 5) { streakMsg = "🔥 STREAK: Economic Insight!"; streakColor = "#fbbf24"; }
    else if (streak === 10) { streakMsg = "⚡ STREAK: Market Shock!"; streakColor = "#f87171"; }
    else if (streak === 20) { streakMsg = "🌌 STREAK: Policy Reform!"; streakColor = "#a855f7"; }

    if (streakMsg) {
        sfxMilestone.currentTime = 0;
        sfxMilestone.play();
        document.getElementById("streakDisplay").innerText = streakMsg;
        document.getElementById("streakDisplay").style.color = streakColor;
    } else if (streak > 0) {
        document.getElementById("streakDisplay").innerText = `Streak: ${streak}`;
        document.getElementById("streakDisplay").style.color = "#60a5fa";
    }
}

function handleVictory() {
    if (typeof bgMusic !== 'undefined') bgMusic.pause();
    if (typeof sfxVictory !== 'undefined') {
        sfxVictory.currentTime = 0;
        sfxVictory.play();
    }
    
    const totalTimeMs = Date.now() - startTime;
    const timeString = formatTime(totalTimeMs);
    const accuracy = Math.round((correctAnswers / totalAttempts) * 100);
    const verificationCode = "ARCH-" + Math.floor(1000 + Math.random() * 9000);
    
    const gameBox = document.getElementById("gameBox");
    // FIXED: changed totalAttemps to totalAttempts below
    gameBox.innerHTML = `
        <div style="text-align:center; padding:30px;">
            <h1 class="victory" style="color:gold; text-shadow: 0 0 20px gold;">👑 CONQUEST COMPLETE 👑</h1>
            
            <div style="margin: 20px 0; padding: 15px; background: rgba(255,255,255,0.05); border-radius: 8px; border: 1px solid #374151;">
                <p>👤 Adventurer: <strong>${username}</strong></p>
                <p>🎯 Accuracy: <strong>${accuracy}%</strong> | 🔥 Best Streak: <strong>${maxStreak}</strong></p>
                <p>⏱️ Time: <strong>${timeString}</strong> | 📝 Total Questions: <strong>${totalAttempts}</strong></p>
                <p style="font-size: 0.8em; color: #9ca3af;">🔑 Verification Code: <span id="vCode">${verificationCode}</span></p>
            </div>
            <div style="display: flex; gap: 10px; justify-content: center; margin-top: 20px;">
                <button id="shareBtn" onclick="copyResults()" style="background:#4ade80; color:black; font-weight:bold; padding:12px 24px; border:none; border-radius:6px; cursor:pointer;">
                    📋 Copy Results
                </button>
                <button onclick="location.reload()" style="background:transparent; color:white; border:1px solid white; padding:12px 24px; border-radius:6px; cursor:pointer;">
                    Try Again
                </button>
            </div>
        </div>
    `;
}
  
function showKnowledgeRoom(bossRoom) {
    const qContainer = document.getElementById("question");
    const aContainer = document.getElementById("answers");
    const msgElement = document.getElementById("message");

    // Clear the "Correct!" fade-out text so it doesn't stay on the summary screen
    msgElement.innerText = "";
    msgElement.className = "";
    
    let title = "";
    let summary = "";

    if (bossRoom === 10) {
        title = "WARDEN OF INDIFFERENCE DEFEATED (Archive 10.1)";
        summary = "As the Warden fades you find the Seal of Preferences. Consumers have consistent preferences represented by indifference curves. They face trade-offs determined by their budget constraint. Optimal consumption occurs where the marginal rate of substitution equals the price ratio. The Labyrinth grows deeper...";
    } else if (bossRoom === 20) {
        title = "DECOMPOSER OF CHOICE DEFEATED (Archive 20.1)";
        summary = "With the Decomposer's defeat you claim the Artifcat of Price Effects. You have conquered the dual nature of price changes. You now distinguish between how price changes affect purchasing power (Income Effect) and relative attractiveness (Substitution Effect).";

        title = "SOVEREIGN OF ELASTICITY DEFEATED (Final Archive)";
        summary = "With the Sovereign finally beaten, you claim the Scepter of Elasticity. You have proven your mastery over Market Responsiveness and the mathematical laws that govern Demand, Elasticity, and Total Revenue.";

    let nextAction = bossRoom === 30 ? "handleVictory()" : "room++; loadQuestion();";

                ${buttonLabel}

}
    
  
function shuffleArray(arr){
    for(let i=arr.length-1;i>0;i--){ let j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; }
    return arr;
}

function updateHighScores(newTimeMs) {
    let scores = JSON.parse(localStorage.getItem("gauntletHighScores")) || [];
    scores.push({ name: username, time: newTimeMs, date: new Date().toLocaleDateString() });
    
    // Sort by time (lowest/fastest first) and keep top 5
    scores.sort((a, b) => a.time - b.time);
    scores = scores.slice(0, 5);
    
    localStorage.setItem("gauntletHighScores", JSON.stringify(scores));
    return scores;
}

function formatTime(ms) {
    let mins = Math.floor(ms / 60000);
    let secs = Math.floor((ms / 1000) % 60);
    return `${mins}m ${secs}s`;
}

function copyResults() {
    const totalTimeMs = Date.now() - startTime;
    const timeString = formatTime(totalTimeMs);
    const code = document.querySelector('.victory + div span').innerText;
    const accuracy = Math.round((correctAnswers / totalAttempts) * 100);
    const shareText = `🎮 Labyrinth of Choice Conquered!\n👤 Adventurer: ${username}\n⏱️ Time: ${timeString}\n🎯 Accuracy: ${accuracy}%\n🔥 Best Streak: ${maxStreak}\n📝 Total Questions: ${totalAttempts}\n🔑 Verification Code: ${code}`;
    
    navigator.clipboard.writeText(shareText).then(() => {
        const btn = document.getElementById("shareBtn");
        const originalText = btn.innerText;
        btn.innerText = "✅ Copied to Clipboard!";
        btn.style.background = "#059669";
        setTimeout(() => {
            btn.innerText = originalText;
            btn.style.background = "#374151";
        }, 2000);
    });
}
