function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

function getMUPerDollar() {
    const mu = Math.floor(Math.random() * 50) + 10;
    const price = [2, 5, 10][Math.floor(Math.random() * 3)];
    return {
        q: `A consumer receives MUx = ${mu} from good X. The price of X is $${price}. What is the Marginal Utility per dollar?`,
        options: [`${(mu/price).toFixed(1)}`, `${mu}`, `${price/mu}`, `${(mu*price)}`],
        a: 0
    };
}

function getEquilibriumCheck() {
    const muX = Math.floor(Math.random() * 20) + 10;
    const pX = [2, 5][Math.floor(Math.random() * 2)];
    const ratio = muX / pX;
    // We want the student to find the MUy that satisfies MUx/Px = MUy/Py
    const pY = 10;
    const correctMUy = ratio * pY;
    
    return {
        q: `A consumer is in equilibrium. MUx = ${muX} and Px = $${pX}. If the price of Good Y (Py) is $${pY}, what must be the Marginal Utility of Good Y (MUy)?`,
        options: [`${correctMUy}`, `${correctMUy / 2}`, `${correctMUy + 10}`, `${muX}`],
        a: 0
    };
}
function getElasticityCalc() {

    const p2 = p1 + 2; // e.g., $10, $12, $14
    
    // Generate two quantity points (Inverse relationship)
    const q1 = (Math.floor(Math.random() * 5) + 8) * 10; // e.g., 80, 90, 100
    const q2 = q1 - 20; // e.g., 60, 70, 80

    // Midpoint Formula calculation
    const chgQ = q2 - q1;
    const midQ = (q1 + q2) / 2;
    const chgP = p2 - p1;
    const midP = (p1 + p2) / 2;

    // Elasticity = |(ΔQ / midQ) / (ΔP / midP)|
    const elasticityVal = Math.abs((chgQ / midQ) / (chgP / midP));
    const elasticity = elasticityVal.toFixed(2);


    let label = "";
    if (elasticityVal > 1) {
        label = "Elastic";
    } else if (elasticityVal < 1) {
        label = "Inelastic";
    } else {
        label = "Unit Elastic";
    }

return {
        q: `When the price of a good increases from $${p1} to $${p2}, the quantity demanded decreases from ${q1} units to ${q2} units. Using the Midpoint (Arc) Method, what is the price elasticity of demand?`,
        options: [
            `${elasticity} (${label})`, 
            `${(1/elasticityVal).toFixed(2)}`, 
            `${(Math.abs(chgQ)/q1 / (chgP/p1)).toFixed(2)}`, // Distractor: simple % change
            "1.00 (Unit Elastic)"
        ],
        a: 0,
        hint: "Arc Elasticity = [(Q2-Q1) / ((Q1+Q2)/2)] / [(P2-P1) / ((P1+P2)/2)]"
    };
}

function getConsumerSurplusCalc() {
    const wtp = Math.floor(Math.random() * 20) + 40; // Higher WTP to ensure positive surplus
    const initialPrice = Math.floor(Math.random() * 10) + 20; // e.g., $20 - $30
    const priceDrop = Math.floor(Math.random() * 5) + 5; // e.g., $5 - $10 drop
    const finalPrice = initialPrice - priceDrop;

    // The increase in surplus is the difference between the price points
    // New Surplus (wtp - finalPrice) - Old Surplus (wtp - initialPrice) = initialPrice - finalPrice
    const surplusIncrease = initialPrice - finalPrice;

    return {
        q: `A buyer is willing to pay $${wtp} for a product. The market price falls from $${initialPrice} to $${finalPrice}. How much does the consumer surplus increase for this buyer?`,
        options: [
            `$${surplusIncrease}`, 
            `$${wtp - finalPrice}`, 
            `$${priceDrop + 10}`, 
            `$${wtp - initialPrice}`
        ],
        a: 0,
    };
}

// Keep track of the last few questions to prevent repeats
let questionHistory = {
    easy: [], medium: [], hard: [], 
    easyBoss: [], mediumBoss: [], finalBoss: []
};

function randomQuestion(poolName) {
    // --- SPECIAL CALCULATED ROOMS (26-29) ---
    // These ensure the student practices specific math skills before the boss
    if (room === 26) return getMUPerDollar();
    if (room === 27) return getEquilibriumCheck();
    if (room === 28) return getConsumerSurplusCalc();
    if (room === 29) return getElasticityCalc();

    let pool = questionBanks[poolName];
    let history = questionHistory[poolName];
    let selected;

    // Filter out recently used questions
    let available = pool.filter(q => !history.includes(q));

    // If we ran out of "new" questions, clear history and start over
    if (available.length === 0) {
        history.length = 0; 
        available = pool;
    }

    selected = available[Math.floor(Math.random() * available.length)];
    
    // Add to history and keep history size manageable (e.g., last 5 questions)
    history.push(selected);
    if (history.length > 5) history.shift();

    return selected;
}

function updateMazeTrack() {
    const track = document.getElementById("mazeTrack");
    track.innerHTML = ""; // Clear the old grid
    
    for (let i = 1; i <= 30; i++) {
        const box = document.createElement("div");
        box.className = "maze-box";
        
        // Determine the icon and state
        if (i < room) {
            box.innerText = "🟩";
            box.style.opacity = "0.6";
        } else if (i === room) {
            box.classList.add("active"); // Trigger the gold pulse
            box.innerText = "🟥";
        } else {
            // Boss icons for future rooms
            if (i === 10) box.innerText = "⚔";
            else if (i === 20) box.innerText = "👹";
            else if (i === 30) box.innerText = "👑";
            else box.innerText = "⬛";
        }
        
        track.appendChild(box);
    }
}

function loadQuestion(){
    updateMazeTrack();

    // 1. Determine difficulty and room count
    let diff = (room<=9) ? "easy" : (room==10) ? "easyBoss" : (room<=19) ? "medium" : (room==20) ? "mediumBoss" : (room<=29) ? "hard" : "finalBoss";
    
    // 2. Trigger Boss Mode visual
    const isBoss = diff.includes("Boss");
    document.getElementById("gameBox").classList.toggle("boss-mode", isBoss);
    
    // 3. Update Header and Progress
    document.getElementById("progressFill").style.width=(room/30*100)+"%";
    document.getElementById("areaDisplay").innerText = `${getAreaName(room)} (${room}/30)`;
    
    let q = randomQuestion(diff);
    currentQuestion = q;
    
    document.getElementById("formulaHint").innerText = q.hint ? "💡 Hint: " + q.hint : "";
    
    if (room === 9 || room === 19 || room === 29) {
        document.getElementById("bossMessage").innerText = "⚠️ DANGER: BOSS DETECTED IN NEXT ROOM ⚠️";
        document.getElementById("bossMessage").style.color = "#ef4444";
    } else {
        document.getElementById("bossMessage").innerText = "";
    }
    
    if(isBoss){
        let bTitle = room==10?"WARDEN OF INDIFFERENCE":room==20?"THE DECOMPOSER OF CHOICE":"SOVEREIGN OF ELASTICITY";
        let bColor = room==10?"#fbbf24":room==20?"#a855f7":"#ef4444";
        document.getElementById("bossMessage").innerText = "⚠ BOSS ENCOUNTER ⚠";
        document.getElementById("question").innerHTML = `<span class="boss-title" style="color:${bColor}">${bTitle}</span><div class="boss-q" style="--bossColor:${bColor}">${q.q}</div>`;
        document.getElementById("gameBox").style.setProperty('--bossColor', bColor);
    } else {
        document.getElementById("question").innerText = q.q;
    }
    
    let opts = q.options.map((opt,i)=>({text:opt,index:i}));
    opts = shuffleArray(opts);
    document.getElementById("answers").innerHTML = opts.map(o=>`<button onclick="answer(${o.index})">${o.text}</button>`).join("");
}

function answer(choice) {
    totalAttempts++;
    const msgElement = document.getElementById("message");
    if (bgMusic.paused) {
        bgMusic.play();
    } 
    if (choice === currentQuestion.a) {
        correctAnswers++;
        streak++;
        if (streak > maxStreak) maxStreak = streak;
        
        let streakMsg = "";
        let streakColor = "#60a5fa";

        if (streak === 5 || streak === 10 || streak === 20) {
            sfxMilestone.currentTime = 0;
            sfxMilestone.play();
            
            if (streak === 5) {
                streakMsg = "🔥 STREAK: Economic Insight!";
                streakColor = "#fbbf24"; 
            } else if (streak === 10) {
                streakMsg = "⚡ STREAK: Market Shock!";
                streakColor = "#f87171";
            } else if (streak === 20) {
                streakMsg = "🌌 STREAK: Policy Reform!";
                streakColor = "#a855f7";
            }
        }

        if (streakMsg) {
            document.getElementById("streakDisplay").innerText = streakMsg;
            document.getElementById("streakDisplay").style.color = streakColor;
            document.getElementById("streakDisplay").animate([
                { transform: 'scale(1)' },
                { transform: 'scale(1.2)' },
                { transform: 'scale(1)' }
            ], { duration: 500 });
        } else if (streak > 0) {
            document.getElementById("streakDisplay").innerText = `Streak: ${streak}`;
            document.getElementById("streakDisplay").style.color = "#60a5fa";
        }

        document.getElementById("message").innerText = "Correct!";

      // Apply Fade-Out Feedback
        msgElement.innerText = `Correct! ${currentQuestion.feedback || ""}`;
        msgElement.className = "fade-out-text";
        
        // Remove and re-add class to restart animation for consecutive correct answers
        msgElement.style.animation = 'none';
        msgElement.offsetHeight; 
        msgElement.style.animation = null;

        // Check if this was a Boss Room (10, 20, 30)
          if (room === 10 || room === 20 || room === 30) {
            showKnowledgeRoom(room); // New function instead of an alert
            return; 
        }
        room++;
        if (room > 30) {
            bgMusic.pause();
            document.getElementById("mazeTrack").classList.add("victory");
            const totalTimeMs = Date.now() - startTime;
            const timeString = formatTime(totalTimeMs);
            const topScores = updateHighScores(totalTimeMs);
            const accuracy = Math.round((correctAnswers / totalAttempts) * 100);
            const isPerfect = accuracy === 100 && room > 30;

            setTimeout(() => {
                sfxVictory.play();
                let scoreRows = topScores.map((s, i) => 
                    `<tr style="${s.time === totalTimeMs ? 'color:#fbbf24;' : ''}">
                        <td>${i + 1}. ${s.name}</td>
                        <td>${formatTime(s.time)}</td>
                    </tr>`).join("");

                document.getElementById("gameBox").innerHTML = `
                    <h2 class="victory">${isPerfect ? "👑 FLAWLESS CONQUEST! 👑" : "CONQUERED!"}</h2>
                    <div style="background:#1f2937; padding:20px; border-radius:10px; margin-top:20px; ${isPerfect ? 'border: 3px solid gold;' : ''}">
                        <p>Well done, <strong>${username}</strong>!</p>
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; font-size: 14px;">
                            <div style="background:rgba(0,0,0,0.3); padding:10px; border-radius:5px;">⏱️ Time: ${timeString}</div>
                            <div style="background:rgba(0,0,0,0.3); padding:10px; border-radius:5px;">🔥 Best Streak: ${maxStreak}</div>
                            <div style="background:rgba(0,0,0,0.3); padding:10px; border-radius:5px;">🎯 Accuracy: ${accuracy}%</div>
                            <div style="background:rgba(0,0,0,0.3); padding:10px; border-radius:5px;">📝 Total Questions: ${totalAttempts}</div>
                        </div>
                        ${isPerfect ? "<p style='color:gold; font-weight:bold;'>✨ LEGENDARY STATUS ACHIEVED: PERFECT RUN ✨</p>" : ""}
                        <hr style="border:0; border-top:1px solid #374151; margin:15px 0;">
                        <table style="width:100%; text-align:left; border-collapse:collapse;">
                            ${scoreRows}
                        </table>
                        <p style="margin-top:20px;">Verification Code: <span style='color:#fbbf24;font-size:20px;'>MAZE-${Math.floor(Math.random() * 9000) + 1000}</span></p>
                        
                        <div style="display:flex; justify-content:center; gap:10px; margin-top:20px;">
                            <button id="shareBtn" onclick="copyResults()">📋 Copy Results for Canvas</button>
                            <button onclick="location.reload()">Try Again</button>
                        </div>
                    </div>`;
                localStorage.removeItem("gauntletRoom");
            }, 1000);
            return;
        }
    } else {
        streak = 0;
        const isBossRoom = (room === 10 || room === 20 || room === 30);
        
        if (isBossRoom) {
            room = Math.max(1, room - 3); 
        } else if (room >= 21) {
            room = Math.max(1, room - 2); 
        } else {
            room = Math.max(1, room - 1); 
        }
        
        localStorage.setItem("gauntletRoom", room);
        // Removed sfxFail call here
        alert(`Incorrect! You trip in the darkness and tumble back to Room ${room}.`);
    }
    loadQuestion();
}

function showKnowledgeRoom(bossRoom) {
    const qContainer = document.getElementById("question");
    const aContainer = document.getElementById("answers");
    const msgElement = document.getElementById("message");

    // Clear the "Correct!" fade-out text so it doesn't stay on the summary screen
    msgElement.innerText = "";
    msgElement.className = "";
    
    let title = "";
    let summary = "";

    if (bossRoom === 10) {
        title = "WARDEN OF INDIFFERENCE DEFEATED (Archive 10.1)";
        summary = "Consumers have consistent preferences represented by indifference curves. They face trade-offs determined by their budget constraint. Optimal consumption occurs where the marginal rate of substitution equals the price ratio. The Labyrinth grows deeper...";
    } else if (bossRoom === 20) {
        title = "DECOMPOSER OF CHOICE DEFEATED (Archive 20.1)";
        summary = "You have conquered the dual nature of price changes. You now distinguish between how price changes affect purchasing power (Income Effect) and relative attractiveness (Substitution Effect).";
    } else if (bossRoom === 30) {
        title = "SOVEREIGN OF ELASTICITY DEFEATED (Final Archive)";
        summary = "The final seal is broken. You have proven your mastery over Market Responsiveness and the mathematical laws that govern Demand, Elasticity, and Total Revenue.";
    }

    // Update the UI
    qContainer.innerHTML = `
        <span class="boss-title" style="color:#60a5fa; text-shadow: 0 0 15px #60a5fa;">${title}</span>
        <div class="boss-q" style="--bossColor:#60a5fa; font-style: normal; border-left-color: #60a5fa;">${summary}</div>
    `;
    
    // logic to ensure Room 30 triggers the end game, while 10 and 20 trigger the next level
    let nextAction = bossRoom === 30 ? "handleVictory()" : "room++; loadQuestion();";
    let buttonLabel = bossRoom === 30 ? "FINALIZE THE ARCHIVE CONQUEST →" : `CONTINUE TO ROOM ${bossRoom + 1} →`;

    aContainer.innerHTML = `
        <button onclick="${nextAction}" 
                style="background:#60a5fa; color:black; font-weight:bold; width:100%; padding:20px; font-size:18px; box-shadow: 0 0 20px rgba(96, 165, 250, 0.5); border:none; border-radius:8px; cursor:pointer;">
                ${buttonLabel}
        </button>`;
}

function handleVictory() {
    // 1. Stop the music
    if (bgMusic) bgMusic.pause();
    
    // 2. Play victory sound
    if (sfxVictory) sfxVictory.play();
    
    // 3. Calculate Stats
    const totalTimeMs = Date.now() - startTime;
    const timeString = formatTime(totalTimeMs);
    const accuracy = Math.round((correctAnswers / totalAttempts) * 100);
    const isPerfect = accuracy === 100;

    // 4. Wipe the gameBox and show the Scroll of Mastery
    const gameBox = document.getElementById("gameBox");
    gameBox.innerHTML = `
        <div style="text-align:center; padding:30px; animation: fadeIn 2s;">
            <h1 style="color:gold; text-shadow: 0 0 20px gold; font-size:45px;">
                👑 ${isPerfect ? "FLAWLESS CONQUEST" : "ARCHIVE CONQUERED"} 👑
            </h1>
            <p style="font-size:22px; color:#c4cad3; margin-bottom:20px;">
                Master <strong>${username}</strong>, your journey is complete.
            </p>
            <div style="background: rgba(255,255,255,0.05); padding:20px; border-radius:12px; border: 1px solid #374151; display:inline-block; min-width:300px;">
                <p style="margin:10px 0;">Final Accuracy: <span style="color:#4ade80; font-weight:bold;">${accuracy}%</span></p>
                <p style="margin:10px 0;">Greatest Streak: <span style="color:#60a5fa; font-weight:bold;">${maxStreak}</span></p>
                <p style="margin:10px 0;">Time of Ascent: <span style="color:#fbbf24; font-weight:bold;">${timeString}</span></p>
            </div>
            <br><br>
            <button onclick="location.reload()" 
                    style="background:gold; color:black; font-weight:bold; padding:15px 40px; border:none; border-radius:8px; cursor:pointer; font-size:18px;">
                RE-ENTER THE LABYRINTH
            </button>
        </div>
    `;
    
    // Remove the room save so they can start fresh next time
    localStorage.removeItem("gauntletRoom");
}  
  
function shuffleArray(arr){
    for(let i=arr.length-1;i>0;i--){ let j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; }
    return arr;
}

function updateHighScores(newTimeMs) {
    let scores = JSON.parse(localStorage.getItem("gauntletHighScores")) || [];
    scores.push({ name: username, time: newTimeMs, date: new Date().toLocaleDateString() });
    
    // Sort by time (lowest/fastest first) and keep top 5
    scores.sort((a, b) => a.time - b.time);
    scores = scores.slice(0, 5);
    
    localStorage.setItem("gauntletHighScores", JSON.stringify(scores));
    return scores;
}

function formatTime(ms) {
    let mins = Math.floor(ms / 60000);
    let secs = Math.floor((ms / 1000) % 60);
    return `${mins}m ${secs}s`;
}

function copyResults() {
    const totalTimeMs = Date.now() - startTime;
    const timeString = formatTime(totalTimeMs);
    const code = document.querySelector('.victory + div span').innerText;
    const accuracy = Math.round((correctAnswers / totalAttempts) * 100);
    const shareText = `🎮 Microeconomics Gauntlet Conquered!\n👤 Adventurer: ${username}\n⏱️ Time: ${timeString}\n🎯 Accuracy: ${accuracy}%\n🔥 Best Streak: ${maxStreak}\n📝 Total Questions: ${totalAttempts}\n🔑 Verification Code: ${code}`;
    
    navigator.clipboard.writeText(shareText).then(() => {
        const btn = document.getElementById("shareBtn");
        const originalText = btn.innerText;
        btn.innerText = "✅ Copied to Clipboard!";
        btn.style.background = "#059669";
        setTimeout(() => {
            btn.innerText = originalText;
            btn.style.background = "#374151";
        }, 2000);
    });
}
